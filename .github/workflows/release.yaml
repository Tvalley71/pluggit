name: Release Workflow

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number to release or simulate (e.g. 0.4.11)'
        required: true
        default: '0.0.0'
      target_branch:
        description: 'Target branch to push changes to when manually dispatching'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: 🧠 Define variables
        run: |
          # Hvis workflow trigges af et release-event
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_ENV

            # Hvis release er en prerelease, sæt target_branch til test (eller anden ønsket branch)
            if [ "${{ github.event.release.prerelease }}" = "true" ]; then
              echo "target_branch=test" >> $GITHUB_ENV
            else
              echo "target_branch=main" >> $GITHUB_ENV
            fi

          else
            # workflow_dispatch (manuel) — brug inputs
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_ENV
            echo "target_branch=${{ github.event.inputs.target_branch }}" >> $GITHUB_ENV
          fi

      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.target_branch }}

      - name: 🔍 Check Dantherm sync state
        run: |
          if [ ! -f ".github/sync-state/dantherm-sync.json" ]; then
            if [ "${{ github.event_name }}" = "release" ]; then
              echo "Missing .github/sync-state/dantherm-sync.json. Run sync-from-dantherm workflow first."
              exit 1
            fi

            echo "::warning::Missing .github/sync-state/dantherm-sync.json. Run sync-from-dantherm before release."
          else
            echo "Dantherm sync metadata found:"
            cat ".github/sync-state/dantherm-sync.json"
          fi
    
      - name: 🔢 Set version number in manifest
        run: |
          echo "Using version: $version"
          jq --arg version "$version" '.version = $version' \
            "custom_components/pluggit/manifest.json" > tmp \
            && mv -f tmp "custom_components/pluggit/manifest.json"

      - name: ✅ Validate manifest version
        run: |
          manifestversion=$(jq -r '.version' custom_components/pluggit/manifest.json)
          if [ "$manifestversion" != "$version" ]; then
            echo "Manifest version ($manifestversion) does not match expected version ($version)"
            exit 1
          fi

      - name: 📦 Create zip file
        run: |
          mkdir -p dist
          cd custom_components/pluggit
          zip -r ../../dist/pluggit.zip .

      - name: 📤 Upload release asset (only for real releases)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pluggit.zip
          token: ${{ github.token }}
